<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Xadrez Pro</title>
    
    <!-- Bootstrap & ChessboardJS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- SISTEMA DE TEMAS (CSS Variables) --- */
        :root {
            /* Padrão (Dark Gold) */
            --bg-body: #212529;
            --bg-panel: #2c3034;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            
            --accent-color: #ffc107; /* Amarelo Ouro */
            --chart-line: #ffc107;
            --arrow-color: #ffc107;  /* Seta Amarela */
            
            --board-white: #f0d9b5;
            --board-black: #b58863;
        }

        /* Tema Azul (Cyber) */
        [data-theme="blue"] {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --accent-color: #38bdf8;
            --chart-line: #38bdf8;
            --arrow-color: #00d2ff; /* Azul Neon vibrante para contraste */
            --board-white: #dee3e6;
            --board-black: #4773a6;
        }

        /* Tema Verde (Forest) */
        [data-theme="green"] {
            --bg-body: #1a2f1a;
            --bg-panel: #264226;
            --accent-color: #76c442;
            --chart-line: #76c442;
            --arrow-color: #39ff14; /* Verde Fluorescente para não sumir no bege */
            --board-white: #eeeed2;
            --board-black: #769656;
        }

        /* Tema Roxo (Galaxy) */
        [data-theme="purple"] {
            --bg-body: #240046;
            --bg-panel: #3c096c;
            --accent-color: #e0aaff;
            --chart-line: #e0aaff;
            --arrow-color: #ff00ff; /* MAGENTA/ROSA CHOQUE (Essencial para ver no roxo) */
            --board-white: #e0aaff;
            --board-black: #5a189a;
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s; }
        
        /* Tabuleiro Cores Dinâmicas */
        .white-1e1d7 { background-color: var(--board-white) !important; color: var(--board-black); }
        .black-3c85d { background-color: var(--board-black) !important; color: var(--board-white); }

        /* Barra de Temas */
        .theme-selector { 
            background: var(--bg-panel); 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .theme-btn { 
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); 
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; 
        }
        .theme-btn:hover { transform: scale(1.15); box-shadow: 0 0 10px var(--accent-color); }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px 20px; }

        /* Botão Novo Jogo */
        .btn-new-game {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 15px;
            border: none;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: filter 0.2s, transform 0.1s;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-new-game:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-new-game:active { transform: translateY(0); }

        /* Layout Principal */
        .top-section { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; align-items: flex-start; }

        /* Barra Eval */
        .eval-bar-wrapper { 
            width: 40px; height: 460px; background: #111; 
            border: 1px solid #555; position: relative; 
            border-radius: 6px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .eval-fill { width: 100%; background: #fff; position: absolute; bottom: 0; transition: height 0.5s ease; }
        
        .eval-bar-wrapper.flipped-mode {
            background-color: #f8f9fa !important; 
            border-color: #ccc;
        }
        .eval-fill.flipped-mode {
            background-color: #212529 !important; 
        }
        
        /* Linha central da Eval Bar */
        .eval-bar-wrapper::after {
            content: "";
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background-color: rgba(255, 0, 0, 0.6); z-index: 10; pointer-events: none;
            transform: translateY(-50%);
        }
        .eval-bar-wrapper::before {
            content: "0.0"; position: absolute; top: 50%; left: 110%;
            transform: translateY(-50%); font-size: 0.7rem; color: #888; font-weight: bold;
        }

        /* Tabuleiro */
        .board-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .board-wrapper { position: relative; width: 460px; height: 460px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; }
        #board { width: 100%; height: 100%; }

        /* Controles */
        .controls-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .control-btn { 
            background: var(--bg-panel); color: var(--text-main); 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px 20px; font-size: 1.2rem; border-radius: 8px; 
            transition: background 0.2s;
        }
        .control-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .flip-btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            font-size: 1rem;
        }
        .flip-btn:hover { background: var(--accent-color); color: #000; }

        /* Info Panel */
        .info-panel { 
            background: var(--bg-panel); padding: 30px; border-radius: 12px; 
            width: 350px; height: 460px; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .move-display { font-size: 4rem; font-weight: 900; margin: 20px 0; line-height: 1; color: var(--text-main); }
        .analysis-box { 
            padding: 25px; border-radius: 10px; margin-top: auto; 
            background: rgba(0,0,0,0.3); border-left: 8px solid #666; 
        }
        
        .cls-bom { border-color: #198754; color: #75b798; }
        .cls-erro { border-color: #dc3545; color: #ea868f; }
        .cls-aviso { border-color: #ffc107; color: #ffda6a; }

        /* Gráfico */
        .bottom-section { 
            margin-top: 40px; background: var(--bg-panel); padding: 20px; 
            border-radius: 12px; height: 350px; width: 100%; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* Loading */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: none; justify-content: center; align-items: center; flex-direction: column;
        }

        /* --- MELHORIA DAS SETAS (SVG) --- */
        #arrowOverlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 100;
            /* SOMBRA IMPORTANTE: Isso faz a seta ser visível em qualquer fundo */
            filter: drop-shadow(1px 2px 2px rgba(0, 0, 0, 0.8));
        }
        #arrowLine { transition: stroke 0.3s; stroke-linecap: round; }
        #arrowhead path { transition: fill 0.3s; }

        /* Responsividade */
        @media (max-width: 900px) {
            .board-wrapper { width: 100%; max-width: 350px; height: 350px; }
            .eval-bar-wrapper { height: 350px; }
            .info-panel { width: 100%; height: auto; min-height: 200px; }
            .move-display { font-size: 3rem; }
        }
    </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingOverlay">
    <div class="spinner-border text-warning" style="width: 4rem; height: 4rem;" role="status"></div>
    <h3 class="text-white mt-4">Analisando Partida...</h3>
    <p class="text-muted">Aguarde enquanto o Stockfish calcula os melhores lances.</p>
</div>

<!-- MODAL NOVO JOGO -->
<div class="modal fade" id="newGameModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="background: var(--bg-panel); color: var(--text-main);">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="fas fa-chess-board"></i> Analisar Novo Jogo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Cole o PGN completo do jogo abaixo:</p>
                <textarea id="pgnInput" class="form-control bg-dark text-white border-secondary" rows="10" placeholder='[Event "Game"] ... 1. e4 e5 ...'></textarea>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn" style="background: var(--accent-color); color: #000; font-weight: bold;" onclick="submitPgn()">🚀 Iniciar Análise</button>
            </div>
        </div>
    </div>
</div>

<!-- BARRA DE TEMAS -->
<div class="theme-selector">
    <div class="theme-btn" style="background: #ffc107;" onclick="setTheme('default')" title="Ouro (Padrão)"></div>
    <div class="theme-btn" style="background: #38bdf8;" onclick="setTheme('blue')" title="Cyber Azul"></div>
    <div class="theme-btn" style="background: #76c442;" onclick="setTheme('green')" title="Floresta"></div>
    <div class="theme-btn" style="background: #e0aaff;" onclick="setTheme('purple')" title="Roxo"></div>
</div>

<div class="container-fluid">
    <div class="main-container">
        
        <!-- BOTÃO GRANDE DE NOVO JOGO -->
        <button class="btn-new-game" data-bs-toggle="modal" data-bs-target="#newGameModal">
            <i class="fas fa-plus-circle me-2"></i> Colar e Analisar Novo Jogo
        </button>

        <div class="top-section">
            
            <!-- Barra Eval Lateral -->
            <div class="eval-bar-wrapper">
                <div id="evalFill" class="eval-fill" style="height: 50%;"></div>
            </div>

            <!-- Tabuleiro e Controles -->
            <div class="board-container">
                <div class="board-wrapper">
                    <div id="board"></div>
                    <!-- Camada de Seta SVG -->
                    <svg id="arrowOverlay">
                        <defs>
                            <marker id="arrowhead" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
                                <path d="M0,0 L4,2 L0,4" style="fill: var(--arrow-color);" />
                            </marker>
                        </defs>
                        <line id="arrowLine" x1="0" y1="0" x2="0" y2="0" 
                              style="stroke: var(--arrow-color); stroke-width: 7; marker-end: url(#arrowhead); opacity: 0;" />
                    </svg>
                </div>

                <!-- Botões de Controle -->
                <div class="controls-row">
                    <button class="control-btn" onclick="navigate('start')"><i class="fas fa-fast-backward"></i></button>
                    <button class="control-btn" onclick="navigate('prev')"><i class="fas fa-step-backward"></i></button>
                    <button class="control-btn" onclick="navigate('next')"><i class="fas fa-step-forward"></i></button>
                    <button class="control-btn" onclick="navigate('end')"><i class="fas fa-fast-forward"></i></button>
                    
                    <!-- BOTÃO INVERTER -->
                    <button class="control-btn flip-btn" onclick="toggleOrientation()">
                        <i class="fas fa-retweet"></i> Inverter
                    </button>
                </div>
            </div>

            <!-- Painel de Info -->
            <div class="info-panel">
                <div style="flex-grow: 1; display: flex; align-items: center;">
                    <div id="moveSan" class="move-display">...</div>
                </div>
                
                <div id="analysisBox" class="analysis-box">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-uppercase small fw-bold" style="opacity: 0.7;">Avaliação</span>
                        <h2 id="evalVal" class="m-0 fw-bold">0.00</h2>
                    </div>
                    <div id="analysisText" style="font-size: 1.1rem;">Início</div>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="bottom-section">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // --- VARIÁVEIS ---
    let board = null;
    let game = [];
    let idx = 0;
    let myChart = null;
    let isFlipped = false;
    let currentThemeColor = '#ffc107'; // Cor inicial do gráfico

    // --- INICIALIZAÇÃO ---
    $(document).ready(() => {
        board = Chessboard('board', {
            position: 'start',
            draggable: false,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });
        
        $(window).resize(() => board.resize());
        
        // Inicia com tema padrão
        setTheme('default');
        
        loadGame();
    });

    // --- SISTEMA DE TEMAS ATUALIZADO ---
    function setTheme(themeName) {
        // Remove temas antigos
        document.documentElement.removeAttribute('data-theme');
        
        // Aplica novo tema
        if(themeName !== 'default') {
            document.documentElement.setAttribute('data-theme', themeName);
        }

        // Pega as cores computadas (Chart e Seta)
        const styles = getComputedStyle(document.documentElement);
        currentThemeColor = styles.getPropertyValue('--chart-line').trim();
        const arrowColor = styles.getPropertyValue('--arrow-color').trim(); // Nova variável

        // Atualiza elementos SVG da seta com a NOVA cor de seta
        $('#arrowLine').css('stroke', arrowColor);
        $('#arrowhead path').css('fill', arrowColor);

        // Atualiza Gráfico se existir
        if(myChart) {
            myChart.data.datasets[0].borderColor = currentThemeColor;
            myChart.update();
            updateChartPoint();
        }
    }

    // --- LÓGICA DE JOGO ---
    async function submitPgn() {
        const pgnText = document.getElementById('pgnInput').value;
        if(!pgnText.trim()) { alert("Cole o PGN primeiro!"); return; }

        const modal = bootstrap.Modal.getInstance(document.getElementById('newGameModal'));
        modal.hide();
        $('#loadingOverlay').css('display', 'flex');

        try {
            const response = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pgn: pgnText })
            });

            const result = await response.json();

            if (result.error) alert("Erro: " + result.error);
            else {
                idx = 0;
                await loadGame();
            }
        } catch (error) {
            alert("Erro de conexão.");
        } finally {
            $('#loadingOverlay').hide();
        }
    }

    async function loadGame() {
        try {
            const req = await fetch('/data');
            game = await req.json();
            if(game.length) {
                if(myChart) myChart.destroy();
                initChart();
                updateUI();
            }
        } catch(e) { console.error(e); }
    }

    function navigate(action) {
        if (action === 'next' && idx < game.length - 1) idx++;
        else if (action === 'prev' && idx > 0) idx--;
        else if (action === 'start') idx = 0;
        else if (action === 'end') idx = game.length - 1;
        updateUI();
    }

    function toggleOrientation() {
        isFlipped = !isFlipped;
        board.flip();
        updateUI();
    }

    function updateUI() {
        if(!game[idx]) return;
        const step = game[idx];

        board.position(step.fen, false);
        $('#moveSan').text(step.move);
        
        let evalText = step.eval;
        if(!evalText.includes('-') && !evalText.includes('M') && evalText !== '0.00') {
            evalText = '+' + evalText.replace('+','');
        }
        $('#evalVal').text(evalText);
        $('#analysisText').text(step.analysis);

        const box = $('#analysisBox');
        box.removeClass('cls-bom cls-erro cls-aviso');
        const txt = (step.analysis || '').toLowerCase();
        
        if (txt.includes('melhor') || txt.includes('excelente')) box.addClass('cls-bom');
        else if (txt.includes('grave')) box.addClass('cls-erro');
        else if (txt.includes('imprecis') || txt.includes('erro')) box.addClass('cls-aviso');

        // Barra Eval
        const $evalWrapper = $('.eval-bar-wrapper');
        const $evalFill = $('#evalFill');
        if (isFlipped) {
            $evalWrapper.addClass('flipped-mode');
            $evalFill.addClass('flipped-mode');
        } else {
            $evalWrapper.removeClass('flipped-mode');
            $evalFill.removeClass('flipped-mode');
        }

        let v = step.eval_val;
        let displayVal = isFlipped ? -v : v;
        const sigmoid = 1 / (1 + Math.exp(-0.3 * displayVal));
        $evalFill.css('height', `${sigmoid * 100}%`);

        drawArrow(step.arrow);
        if(myChart) updateChartPoint();
    }

    // --- FUNÇÃO DE DESENHAR SETA ATUALIZADA ---
    function drawArrow(arrowData) {
        const line = document.getElementById('arrowLine');
        if (!arrowData || !arrowData.from) {
            line.style.opacity = 0;
            return;
        }

        setTimeout(() => {
            const $sqFrom = $(`.square-${arrowData.from}`);
            const $sqTo = $(`.square-${arrowData.to}`);

            if ($sqFrom.length && $sqTo.length) {
                const posFrom = $sqFrom.position();
                const posTo = $sqTo.position();
                const size = $sqFrom.width();

                const x1 = posFrom.left + size / 2;
                const y1 = posFrom.top + size / 2;
                const x2 = posTo.left + size / 2;
                const y2 = posTo.top + size / 2;

                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                
                // PEGA A NOVA COR DA SETA DO CSS
                const styles = getComputedStyle(document.documentElement);
                const arrowColor = styles.getPropertyValue('--arrow-color').trim();
                
                line.style.stroke = arrowColor;
                $('#arrowhead path').css('fill', arrowColor);

                line.style.opacity = 0.9;
            }
        }, 20);
    }

    // --- GRÁFICO (Chart.js) ---
    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        const labels = game.map((_, i) => i);
        const data = game.map(d => d.eval_val);
        const styles = getComputedStyle(document.documentElement);
        currentThemeColor = styles.getPropertyValue('--chart-line').trim();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Vantagem',
                    data: data,
                    borderColor: currentThemeColor,
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: {
                        target: 'origin',
                        above: 'rgba(255, 255, 255, 0.05)',
                        below: 'rgba(255, 255, 255, 0.05)'
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                onClick: (e) => {
                    const points = myChart.getElementsAtEventForMode(e, 'index', { intersect: false }, true);
                    if (points.length) { idx = points[0].index; updateUI(); }
                },
                plugins: { legend: { display: false }, tooltip: { enabled: true } },
                scales: {
                    x: { display: false },
                    y: { 
                        display: true, 
                        grid: { 
                            color: (context) => context.tick.value === 0 ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 255, 255, 0.05)',
                            lineWidth: (context) => context.tick.value === 0 ? 2 : 1
                        },
                        ticks: { color: '#888' },
                        suggestedMin: -5, 
                        suggestedMax: 5
                    }
                },
                animation: false
            }
        });
    }

    function updateChartPoint() {
        const colors = game.map((_, i) => i === idx ? '#fff' : 'rgba(0,0,0,0)');
        const radii = game.map((_, i) => i === idx ? 6 : 0);
        const borders = game.map((_, i) => i === idx ? currentThemeColor : 'rgba(0,0,0,0)');
        
        myChart.data.datasets[0].pointBackgroundColor = colors;
        myChart.data.datasets[0].pointRadius = radii;
        myChart.data.datasets[0].pointBorderColor = borders;
        myChart.update('none');
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === "ArrowRight") navigate('next');
        if(e.key === "ArrowLeft") navigate('prev');
        if(e.key === "f" || e.key === "F") toggleOrientation();
    });
</script>

</body>
</html>
